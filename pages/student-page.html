<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Coding Lecture</title>
  </head>
  <body id="student-page-interface">
    <div id="app">
      <div class="topbar">
        <div class="topbar-left">
          <span>
            <span id="session-name-display"></span>
          </span>
        </div>
        <div class="topbar-right">
          <span>
            <span id="student-email"></span>
            <a href="#" id="change-email" hidden>(change)</a>
          </span>
        </div>
      </div>
      <div class="parent-container">
        <div id="code-tabs">
          <div id="code-tabs-inner">
            <div class="code-tab selected blink-tab" id="instructor-code-tab">
              <div class="code-tab-text">instructor.py</div>
            </div>
            <div class="code-tab" id="playground-code-tab">
              <div class="code-tab-text">playground.py</div>
            </div>
          </div>
        </div>
        <div id="instructor-code-container" class="code-container uneditable">
          <!-- <button class="try-it-out" id="try-instructor-code">
            Open in Playground
          </button> -->
        </div>
        <div
          id="playground-code-container"
          class="code-container"
          style="display: none"
        >
          <button id="run-button">▶ ️Run</button>
        </div>
        <div id="resize-console"><div class="resize-symbol"></div></div>
        <div id="output-container">
          <div id="all-code-outputs" class="empty">
            Code output will appear here...
          </div>
        </div>
        <div id="resize-activities">
          <button id="toggle-activities-panel" title="Toggle Activities Panel">▶</button>
        </div>
        <div id="activities-container">
          <div id="student-activities-list">
            <div id="student-activities-list-header">Activities</div>
            <div id="student-activities-list-items"></div>
            <div id="student-activities-placeholder">No activities yet</div>
          </div>
          <div id="student-activity" hidden>
            <div id="student-activity-header">
              <button id="student-activity-back">← Back to list</button>
            </div>
            <div id="student-activity-instructions"></div>
            <div id="student-answer-display" hidden></div>
            <div id="student-code-submitted" hidden></div>
            <textarea id="student-answer-input" placeholder="Your answer..." maxlength="500"></textarea>
            <div id="student-code-editor" hidden></div>
            <button id="student-submit-btn">Submit</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-background">
      <div class="modal">
        <div>Enter lecture ID:</div>
        <div>
          <input type="text" />
        </div>
        <div>
          <button id="fetch-session">Okay</button>
        </div>
        <div id="load-session-error"></div>
      </div>
    </div>
    <script type="module" src="/src/client/student-page.js"></script>
  </body>
</html>
