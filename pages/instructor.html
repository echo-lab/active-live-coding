<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Coding Lecture</title>
  </head>
  <body id="instructor-interface">
    <div id="app">
      <div class="topbar">
        <div class="topbar-left">
          <h3 id="session-name-display"></h3>
          <!-- <h2>Instructor's Code</h2> -->
        </div>
        <div class="run-button-grid">
          <button id="run-button">▶ ️Run</button>
          <button id="poll-button">Poll</button>
        </div>
        <div class="topbar-right">
          <span id="session-info">
            <span id="session-details"></span>
            <button id="start-session-butt">start</button
            ><button id="end-session-butt" disabled>end</button>
          </span>
        </div>
      </div>
      <div class="parent-container">
        <div id="code-tabs">
          <div id="code-tabs-inner">
            <div class="code-tab selected" id="instructor-code-tab">
              <div class="code-tab-text">instructor.py</div>
            </div>
          </div>
        </div>
        <div id="code-container" class="code-container"></div>
        <div id="resize-console"><div class="resize-symbol"></div></div>
        <div id="output-container">
          <div id="all-code-outputs" class="empty">
            Code output will appear here...
          </div>
        </div>
        <div id="resize-activities">
          <button id="toggle-activities-panel" title="Toggle Activities Panel">▶</button>
        </div>
        <div id="activities-container">
          <div id="activities-list">
            <div id="activities-list-header">Activities</div>
            <div id="activities-list-items"></div>
          </div>
          <div id="activities-create" hidden>
            <button id="activities-back">← Back to list</button>
            <div id="activity-type-toggle">
              <button class="type-btn active" data-type="POLL">Text</button>
              <button class="type-btn" data-type="CODE">Code</button>
              <button class="type-btn" data-type="CODE_FORK">Fork</button>
            </div>
            <textarea id="activity-instructions" placeholder="Describe the activity..."></textarea>
            <button id="activity-submit-create">Start Activity</button>
          </div>
          <div id="activities-active" hidden>
            <div id="activity-active-header">
              <button id="activities-active-back">← Back to list</button>
              <div id="activity-timer">0:00</div>
            </div>
            <div id="activity-active-instructions"></div>
            <div id="activity-response-count">0 responses</div>
            <button id="activity-finish">Finish</button>
          </div>
          <div id="activities-summary" hidden>
            <button id="activities-summary-back">← Back to list</button>
            <div id="activity-summary-instructions"></div>
            <div id="activity-summary-responses"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/client/instructor.js"></script>
  </body>
</html>
